<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="50%" stop-color="#8a2be2"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="120" rx="16" ry="16" fill="#050505"/>
  <rect width="400" height="120" rx="16" ry="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- Terminal Icon with glow -->
  <g transform="translate(32, 28)" stroke="#00f3ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#iconGlow)">
    <rect x="0" y="0" width="56" height="56" rx="8" ry="8" opacity="0.9"/>
    <polyline points="14,22 26,32 14,42"/>
    <line x1="32" y1="42" x2="44" y2="42"/>
  </g>
  
  <!-- "Dulaidila" text -->
  <text x="108" y="72" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="42" fill="#f8f8f8" letter-spacing="-0.5">Dulaidila</text>
  
  <!-- Dot "." in pink with glow -->
  <text x="350" y="72" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="42" fill="#ff00ff" filter="url(#glow)">.</text>
  
  <!-- Subtle gradient underline -->
  <rect x="108" y="82" width="258" height="2" rx="1" fill="url(#neonGlow)" opacity="0.3"/>
</svg>
